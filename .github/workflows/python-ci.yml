name: Python Multi-Stage Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ESTÁGIO 1: Linting
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install Linting Tools
        run: pip install flake8
      - name: Run Lint
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

  # ESTÁGIO 2: Testes (Só roda se o Lint passar)
  test:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Run Tests
        run: pytest

  # ESTÁGIO 3: Deploy/Build (Só roda se os Testes passarem)
  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' # Só faz deploy se for na branch main
    steps:
      - name: Deploy Simulation
        run: echo "O código foi testado e aprovado. Iniciando deploy para produção..."
